version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: elmansa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elmansa_secret}
      POSTGRES_DB: elmansa_lms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - elmansa-net

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: elmansa-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - elmansa-net

  # Backend API Server
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
      target: development
    container_name: elmansa-server
    restart: unless-stopped
    env_file:
      - ./apps/server/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-elmansa_secret}@postgres:5432/elmansa_lms
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
    ports:
      - '5001:5000'
    volumes:
      - ./apps/server/src:/app/src
      - ./apps/server/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - elmansa-net
    command: sh -c "npx prisma db push --accept-data-loss && npm run dev"

  # Frontend Dev Server
  client:
    build:
      context: ./apps/client
      dockerfile: Dockerfile
      target: development
    container_name: elmansa-client
    restart: unless-stopped
    env_file:
      - ./apps/client/.env
    ports:
      - '5173:5173'
    volumes:
      - ./apps/client/src:/app/src
      - ./apps/client/public:/app/public
    networks:
      - elmansa-net
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:

networks:
  elmansa-net:
    driver: bridge
