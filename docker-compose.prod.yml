
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: elmansa_lms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - elmansa-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - elmansa-net

  server:
    image: ${SERVER_IMAGE:-elmansa/server:latest}
    restart: always
    env_file: ./apps/server/.env.production
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/elmansa_lms
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - elmansa-net
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  client:
    image: ${CLIENT_IMAGE:-elmansa/client:latest}
    restart: always
    networks:
      - elmansa-net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - server
      - client
    networks:
      - elmansa-net

volumes:
  postgres_data:
  redis_data:
  nginx_cache:

networks:
  elmansa-net:
    driver: bridge
